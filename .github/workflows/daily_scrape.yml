name: NB Daily Scrape — Halo Oglasi

on:
  schedule:
    # Svaki dan u 08:00 UTC (09:00 Beograd vreme, 10:00 leti)
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape Prodaja
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: python scraper/scrape_halo.py --mode prodaja

      - name: Scrape Renta
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: python scraper/scrape_halo.py --mode renta

      - name: Commit & push data
        run: |
          git config user.name  "nb-bot"
          git config user.email "nb-bot@nb-tracker"
          git add data/
          git diff --staged --quiet && echo "Nema promena." && exit 0
          git commit -m "data: halo scrape $(date -u +%Y-%m-%d)"
          git pull --rebase -X ours origin main
          git push origin main
